$kind: http-request
name: Health Check
method: GET
url: '{{baseUrl}}/health'
order: 1000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const res = pm.response.json();
      const status = res.status || 'unknown';
      const httpCode = pm.response.code;
      const isOk = status === 'ok';
      const badgeColor = isOk ? '#22c55e' : '#ef4444';
      const badgeBg = isOk ? '#dcfce7' : '#fee2e2';

      const template = `
        <html>
          <body style="margin:0;padding:24px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f9fafb;">
            <div style="max-width:360px;margin:0 auto;background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,0.08);padding:24px;">
              <h2 style="margin:0 0 16px;font-size:16px;font-weight:600;color:#111827;letter-spacing:0.01em;">API Health Status</h2>
              <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
                <span style="font-size:13px;color:#6b7280;min-width:90px;">Status</span>
                <span style="display:inline-block;padding:3px 12px;border-radius:999px;font-size:13px;font-weight:600;color:${badgeColor};background:${badgeBg};">${status}</span>
              </div>
              <div style="display:flex;align-items:center;gap:12px;">
                <span style="font-size:13px;color:#6b7280;min-width:90px;">HTTP Code</span>
                <span style="font-size:13px;font-weight:600;color:#111827;">${httpCode}</span>
              </div>
            </div>
          </body>
        </html>
      `;

      pm.visualizer.set(template);